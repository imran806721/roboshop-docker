name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: imranjoindevops/mongodb:4.0.0 # docker build -t imranjoindevops/mongodb:4.0.0
    container_name: mongodb # docker run -d --network roboshop imranjoindevops/mongodb:4.0.0
    volumes:
    - mongodb:/data/db # mongodb stores data in /data/db directory
  catalogue:
    build: ./catalogue
    image: imranjoindevops/catalogue:4.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  frontend:
    build: ./frontend
    image: imranjoindevops/frontend:4.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
  user:
    build: ./user
    image: imranjoindevops/user:4.0.0
    container_name: user
    environment:
      MONGO: true
      REDIS_URL: 'redis://redis:6379'
      MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
    - redis
    - mongodb 
  cart:
    build: ./cart
    image: imranjoindevops/cart:4.0.0
    container_name: cart
    environment:
      REDIS_HOST: redis
      CATALOGUE_HOST: catalogue
      CATALOGUE_PORT: 8080
    depends_on:
    - redis
    - catalogue
  redis:
    image: redis:7
    container_name: redis # docker run -d --name redis --network roboshop redis:7
    volumes:
    - redis:/data
  mysql:
    image: imranjoindevops/mysql:4.0.0
    build: ./mysql
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "RoboShop@1"
    volumes:
    - mysql:/var/lib/mysql   
networks:
  default: # this means all the services in this file use this network
    name: roboshop
    driver: bridge
    external: false # if true it should be created manually, if false docker creates this network
volumes:
  mongodb:
  redis: