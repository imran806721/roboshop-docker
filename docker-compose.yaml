name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: imranjoindevops/mongodb:4.0.0 # docker build -t imranjoindevops/mongodb:4.0.0
    container_name: mongodb # docker run -d --network roboshop imranjoindevops/mongodb:4.0.0
    volumes:
    - mongodb: /data/db # mongodb stores data in /data/db directory
  catalogue:
    build: ./catalogue
    image: imranjoindevops/catalogue:4.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  frontend:
    build: ./frontend
    image: imranjoindevops/frontend:4.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
networks:
  default: # this means all the services in this file use this network
    name: roboshop
    driver: bridge
    external: false # if true it should be created manually, if false docker creates this network